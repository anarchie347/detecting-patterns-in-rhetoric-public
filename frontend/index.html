<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rhetoric Pattern Detector</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <canvas id="fireworksCanvas" class="fireworks-canvas" aria-hidden="true"></canvas>
    <div class="container-shell">
      <div id="leftLetterField" class="letter-field letter-field-left" aria-hidden="true"></div>
      <button
        id="arthurTrigger"
        class="arthur-trigger"
        type="button"
        aria-label="arthur"
      >
        arthur
      </button>
      <main class="container">
        <h1>BS Detector</h1>
        <p class="subtitle">Enter Text</p>

        <label for="inputText" class="label">Enter text</label>
        <textarea
          id="inputText"
          class="text-input"
          placeholder="Type or paste text here..."
        ></textarea>

        <label for="inputFile" class="label">Or upload a text/PDF file</label>
        <input
          id="inputFile"
          class="file-input"
          type="file"
          accept=".txt,.md,.csv,.pdf,text/plain,text/markdown,text/csv,application/pdf"
        />
        <p id="fileStatus" class="file-status" aria-live="polite"></p>

        <div class="button-row">
          <button id="analyzeTextBtn" class="button">Classify Whole Text</button>
          <button id="analyzeTextAndSentencesBtn" class="button button-secondary">
            Classify Text + Sentences
          </button>
        </div>

        <section class="output" aria-live="polite">
          <h2>Result</h2>
          <div class="meters" aria-label="Score meters">
            <div class="meter-card">
              <h3 class="meter-title">BS Score</h3>
              <div class="meter" aria-label="BS score meter">
                <svg id="bsScoreGauge" viewBox="0 0 200 120" class="gauge" role="img">
                  <defs>
                    <linearGradient id="bsGaugeScaleGradient" x1="20" y1="100" x2="180" y2="100" gradientUnits="userSpaceOnUse">
                      <stop offset="0%" stop-color="#16a34a" />
                      <stop offset="50%" stop-color="#f59e0b" />
                      <stop offset="100%" stop-color="#dc2626" />
                    </linearGradient>
                  </defs>
                  <path
                    d="M 20 100 A 80 80 0 0 1 180 100"
                    class="gauge-arc gauge-arc--bg"
                  />
                  <path
                    id="bsGaugeValueArc"
                    d="M 20 100 A 80 80 0 0 1 180 100"
                    class="gauge-arc gauge-arc--value"
                    style="stroke: url(#bsGaugeScaleGradient);"
                  />
                  <g id="bsGaugeNeedle" class="gauge-needle" style="transform-origin: 100px 100px;">
                    <line x1="100" y1="100" x2="170" y2="100" class="gauge-needle-line" />
                  </g>
                  <circle cx="100" cy="100" r="6" class="gauge-cap" />
                </svg>
                <div class="meter-readout">
                  <div class="meter-score">
                    <span id="bsScoreValue">--</span><span class="meter-score-suffix">/100</span>
                  </div>
                  <div id="bsScoreBand" class="meter-band">No score yet</div>
                </div>
              </div>
            </div>

            <div class="meter-card">
              <h3 class="meter-title">AI Score</h3>
              <div class="meter" aria-label="AI score meter">
                <svg id="aiScoreGauge" viewBox="0 0 200 120" class="gauge" role="img">
                  <defs>
                    <linearGradient id="aiGaugeScaleGradient" x1="20" y1="100" x2="180" y2="100" gradientUnits="userSpaceOnUse">
                      <stop offset="0%" stop-color="#16a34a" />
                      <stop offset="50%" stop-color="#f59e0b" />
                      <stop offset="100%" stop-color="#dc2626" />
                    </linearGradient>
                  </defs>
                  <path
                    d="M 20 100 A 80 80 0 0 1 180 100"
                    class="gauge-arc gauge-arc--bg"
                  />
                  <path
                    id="aiGaugeValueArc"
                    d="M 20 100 A 80 80 0 0 1 180 100"
                    class="gauge-arc gauge-arc--value"
                    style="stroke: url(#aiGaugeScaleGradient);"
                  />
                  <g id="aiGaugeNeedle" class="gauge-needle" style="transform-origin: 100px 100px;">
                    <line x1="100" y1="100" x2="170" y2="100" class="gauge-needle-line" />
                  </g>
                  <circle cx="100" cy="100" r="6" class="gauge-cap" />
                </svg>
                <div class="meter-readout">
                  <div class="meter-score">
                    <span id="aiScoreValue">--</span><span class="meter-score-suffix">/100</span>
                  </div>
                  <div id="aiScoreBand" class="meter-band">No score yet</div>
                </div>
              </div>
            </div>
          </div>

          <p id="outputText"></p>
          <div class="highlight-legend" aria-label="Highlight color key">
            <span class="legend-item"><span class="legend-swatch hl-bs"></span>Significant BS</span>
            <span class="legend-item"><span class="legend-swatch hl-ai"></span>Significant AI</span>
            <span class="legend-item"><span class="legend-swatch hl-both"></span>Significant BS + AI</span>
          </div>
          <div id="highlightedText" class="highlighted-text" aria-live="polite"></div>
        </section>
      </main>
      <div id="rightLetterField" class="letter-field letter-field-right" aria-hidden="true"></div>
    </div>

    <script src="./app.js"></script>
  </body>
</html>
